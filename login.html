<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ExamPortal — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --success: #4ade80;
    --error: #f87171;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
  }
  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(60px); }
  }
  /* Glowing orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    opacity: 0.15;
  }
  .orb1 { width: 400px; height: 400px; background: var(--accent); top: -100px; left: -100px; animation: float1 8s ease-in-out infinite; }
  .orb2 { width: 300px; height: 300px; background: var(--accent2); bottom: -80px; right: -80px; animation: float2 10s ease-in-out infinite; }
  @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(40px,30px)} }
  @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-40px)} }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 44px;
    width: 420px;
    position: relative;
    z-index: 1;
    box-shadow: 0 0 0 1px rgba(108,99,255,0.1), 0 32px 64px rgba(0,0,0,0.5);
    animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 36px;
  }
  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
  }
  .logo-text span { color: var(--accent); }

  h2 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 32px;
    font-weight: 300;
  }

  .field { margin-bottom: 20px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
  }
  input::placeholder { color: var(--muted); }

  .btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), #8b85ff);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.3px;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }
  .btn:hover { opacity: 0.92; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .msg {
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    display: none;
  }
  .msg.error { background: rgba(248,113,113,0.1); color: var(--error); border: 1px solid rgba(248,113,113,0.2); display: block; }
  .msg.success { background: rgba(74,222,128,0.1); color: var(--success); border: 1px solid rgba(74,222,128,0.2); display: block; }

  .hint {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
  }
  .hint strong { color: var(--text); }
  .hint-row { display: flex; justify-content: space-between; margin-top: 6px; }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">📝</div>
    <div class="logo-text">Exam<span>Portal</span></div>
  </div>

  <h2>Welcome back</h2>
  <p class="subtitle">Sign in to access your examination portal</p>

  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter your username" autocomplete="username"/>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
  </div>

  <button class="btn" id="loginBtn" onclick="doLogin()">Sign In →</button>
  <div class="msg" id="msg"></div>

  <div class="hint">
    <strong>Demo Credentials</strong>
    <div class="hint-row"><span>Admin:</span><span>admin / admin123</span></div>
    <div class="hint-row"><span>Student:</span><span>student1 / pass123</span></div>
  </div>
</div>

<script>
  // Allow Enter key to login
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const msg = document.getElementById('msg');
    const btn = document.getElementById('loginBtn');

    if (!username || !password) {
      showMsg('Please enter both username and password.', 'error'); return;
    }
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.success) {
        showMsg('Login successful! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = data.role === 'admin' ? '/admin.html' : '/exam.html';
        }, 600);
      } else {
        showMsg(data.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Sign In →';
      }
    } catch {
      showMsg('Server error. Make sure the server is running.', 'error');
      btn.disabled = false;
      btn.textContent = 'Sign In →';
    }
  }

  function showMsg(text, type) {
    const msg = document.getElementById('msg');
    msg.textContent = text;
    msg.className = 'msg ' + type;
  }
</script>
</body>
</html>
